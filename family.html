<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8QTRE4CGNE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8QTRE4CGNE');
    </script>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    
    <title id="seo-title">Family Vocabulary in Korean | Korean Vocabulary Quiz</title>
    <meta id="seo-desc" name="description" content="Learn family members in Korean. Fun quiz for learners.">
    <meta name="keywords" content="Learn Korean, Korean Quiz, Family Korean, Korean Vocabulary">

    <link rel="stylesheet" href="style.css">

    <style>
        /* 1. 퀴즈 앱 전체에 하단 여백을 충분히 주어 eSIM 배너가 4버튼 메뉴에 절대 가려지지 않게 조절 */
        .quiz-app {
            padding-bottom: 90px !important;
            box-sizing: border-box !important;
            min-height: calc(100vh - 60px) !important;
        }

        /* 2. 최하단 4버튼 메뉴 바를 화면 맨 위에 고정시키고 배경색을 강제하여 투명화 방지 */
        .bottom-menu {
            display: flex !important;
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            z-index: 9999 !important;
            background-color: #ffffff !important;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.1) !important;
        }

        /* 3. eSIM 광고 박스와 1000문장 배너가 자바스크립트에 의해 숨겨지는 것을 원천 차단 */
        .control-panel, .game-ad-bar, .wide-slim-banner {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
        .game-ad-bar {
            display: flex !important;
        }
    </style>
</head>
<body>

<div class="quiz-app">
    <div id="top-open-btn" class="top-window-notice" onclick="forceExternalBrowser()">
        🔗 FB.TikTok / Sound Problem? >> Click here to open in New Window
    </div>

    <h1 id="main-header" class="header">Learn Korean Game: 1,000+ Word Quiz</h1>
 
    <div class="content-area">
        
        <div id="menu-screen" class="screen" style="display: none !important;">
            <div id="category-screen">
                <div id="guide-box"></div>
                <div id="guide-content"></div>
            </div>
            <div id="today-quiz-section">
                <div id="today-title"></div>
                <div id="today-quiz-content">
                    <div id="teacher-tip-text"></div>
                    <div id="today-kr"></div>
                    <div id="today-rom"></div>
                    <div id="today-feedback"></div>
                    <div id="today-options"></div>
                </div>
            </div>
            <div id="category-list"></div>
        </div>

        <div id="quiz-screen" class="quiz-screen" style="display: block;">
            <div class="situation-tag" id="situation">---</div>

            <div id="category-tip-container" style="background: #fff9db; border-radius: 12px; padding: 15px; margin: 10px 0; border-left: 8px solid #fcc419; text-align: left;">
                <div style="font-weight: bold; color: #925211; font-size: 0.9rem; margin-bottom: 5px;">👩‍🏫 Teacher's Tip</div>
                <div id="category-tip-text" style="font-size: 1.4rem; font-weight: 800; color: #5f3e07; line-height: 1.4;">
                    Tap to start learning!
                </div>
            </div>

            <div class="kr-text notranslate" id="korean-sentence" translate="no">---</div>
            <div class="rom-text notranslate" id="romanization" translate="no">---</div>
            
            <div class="control-group">
                <button class="btn-main" onclick="speak()">
                    <span class="icon">🔊</span><span>LISTEN</span>
                </button>
                <button class="btn-main" id="mic-btn" onclick="startSpeechRecognition()">
                    <span class="icon">🎤</span><span>SPEAK</span>
                </button>
                <button class="btn-main" style="background:#e0e7ff; color:var(--primary);" onclick="nextQuiz()">
                    <span class="icon">⏭️</span><span>NEXT</span>
                </button>
            </div>
            
            <div id="feedback" style="height: 35px; font-weight: 900; font-size: 1.4rem; margin-bottom: 10px; text-align: center;"></div>
            <div class="options-container" id="options-container"></div>

            <div style="display: flex; gap: 10px; justify-content: center; width: 100%; margin-top: 25px;">
                <button class="back-link" style="margin-top: 0;" onclick="goHome()">🏠 HOME</button>
                <button class="back-link hint-btn" style="margin-top: 0;" onclick="showCorrectAnswer()">💡 Answer</button>
            </div>
            
            <div class="control-panel" style="text-align: center; margin: 25px auto; width: 100%; max-width: 600px; position: relative; z-index: 1000;">
                <div class="game-ad-bar">
                    <div class="korea-badge">🇰🇷</div>
                    <a href="https://breezesim.com/products/esim-south-korea?sca_ref=10996533.84IFCCRU2g" target="_blank" class="esim-btn-link">Get Korea eSIM</a>
                    <div class="ad-moving-text" id="ad-content">No internet in Korea? You'll need data!</div>
                    <div class="ad-fixed-small">+ Available in 200 countries</div>
                </div>
                <br>
                <div style="font-size: 0.9rem; font-weight: bold; color: #64748b;">1,000+ Essential Korean sentences / free</div>
                <a href="https://kstudy.netlify.app/" target="_blank" class="wide-slim-banner"></a>
            </div>
        </div>

    </div>
</div>

<div class="bottom-menu">
    <button onclick="shareApp()" class="menu-item">
        <span class="menu-emoji">📤</span>
        <span class="menu-label">Share</span>
    </button>
    <button onclick="visitFacebook()" class="menu-item">
        <span class="menu-emoji">📱</span>
        <span class="menu-label">Facebook</span>
    </button>
    <button onclick="addToHome()" class="menu-item">
        <span class="menu-emoji">🏠</span>
        <span class="menu-label">Save App</span>
    </button>
    <button onclick="sendEmail()" class="menu-item">
        <span class="menu-emoji">📧</span>
        <span class="menu-label">E-mail</span>
    </button>
</div>

<script src="date.js"></script>
<script src="script.js"></script>

<script>
    window.addEventListener('load', () => {
        if (typeof startQuiz === 'function') {
            startQuiz('cat_01');
        }
    });
</script>
</body>
</html>
