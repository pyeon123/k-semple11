<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    
    <title id="seo-title">Learn Family in Korean - Free Interactive Quiz</title>
    <meta id="seo-desc" name="description" content="Master essential Korean Family vocabulary. Practice pronunciation and test your skills with our free interactive Family quiz!">
    <meta name="keywords" content="Learn Korean, Korean Quiz, Family Korean, Korean Vocabulary">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8QTRE4CGNE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8QTRE4CGNE');
    </script>

    <link rel="stylesheet" href="style.css">

    <style>
        /* 🚨 [긴급 조치 1] 좀비처럼 튀어나오는 하단 박스 3개는 눈에 보이지 않게 아예 물리적으로 삭제 수준으로 숨깁니다. */
        #menu-screen, #category-list, .menu-container, #category-screen, #today-quiz-section {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            height: 0 !important;
            max-height: 0 !important;
            overflow: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* 🚨 [긴급 조치 2] 퀴즈 화면은 자바스크립트가 꺼버리지 못하도록 무조건 강제 노출합니다. */
        #quiz-screen {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        /* 🚨 [긴급 조치 3] 정답 클릭 시 생성되는 예문 영역이 절대 광고 밑으로 가지 못하도록 순서를 박살내고 강제 배치합니다. */
        .content-area {
            display: flex !important;
            flex-direction: column !important;
            padding-bottom: 240px !important; /* 아래 공간 넉넉히 확보 */
            box-sizing: border-box !important;
        }
        
        #quiz-screen { order: 1 !important; }
        
        /* 자바스크립트가 생성하는 예문 박스가 광고판(.control-panel)보다 무조건 위에 그리도록 강제 명령 */
        #detail-area, .quiz-detail-box {
            order: 2 !important;
            display: block !important;
            visibility: visible !important;
            margin: 20px auto !important;
            width: 100% !important;
            position: relative !important;
        }

        /* 🚨 [긴급 조치 4] 잘려 보이던 하단 광고판을 완전히 독립시켜서 예문 박스보다 무조건 아래에 고정시킵니다. */
        .control-panel {
            order: 3 !important;
            display: block !important;
            visibility: visible !important;
            text-align: center !important;
            margin: 30px auto 20px auto !important;
            width: 100% !important;
            max-width: 600px !important;
        }

        /* 🚨 [긴급 조치 5] 화면 맨 밑에 붙는 4버튼 바 안정화 */
        .bottom-menu {
            display: flex !important;
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            z-index: 99999 !important;
            background-color: #ffffff !important;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.1) !important;
        }
    </style>
</head>
<body>

<div class="quiz-app">
    <div id="top-open-btn" class="top-window-notice" onclick="forceExternalBrowser()">
        🔗 FB.TikTok / Sound Problem? >> Click here to open in New Window
    </div>

    <h1 id="main-header" class="header">Korean Vocabulary Quiz</h1>
 
    <div class="content-area">
        
        <div id="menu-screen" style="display:none !important;">
            <div id="category-screen"> <div id="guide-box"></div> <div id="guide-content"></div> </div>
            <div id="today-quiz-section">
                <div id="today-title"></div> <div id="today-quiz-content"> <div id="today-kr"></div> </div>
            </div>
            <div id="category-list"></div> <div class="menu-container"></div>
        </div>

        <div id="quiz-screen" class="quiz-screen">
            <div class="situation-tag" id="situation">Family</div>

            <div id="category-tip-container" style="background: #fff9db; border-radius: 12px; padding: 15px; margin: 10px 0; border-left: 8px solid #fcc419; text-align: left;">
                <div style="font-weight: bold; color: #925211; font-size: 0.9rem; margin-bottom: 5px;">👩‍🏫 Teacher's Tip</div>
                <div id="category-tip-text" style="font-size: 1.4rem; font-weight: 800; color: #5f3e07; line-height: 1.4;">
                    Listen and repeat the phrase!
                </div>
            </div>

            <div class="kr-text notranslate" id="korean-sentence" translate="no">---</div>
            <div class="rom-text notranslate" id="romanization" translate="no">---</div>
            
            <div class="control-group">
                <button class="btn-main" onclick="speak()">
                    <span class="icon">🔊</span><span>LISTEN</span>
                </button>
                <button class="btn-main" id="mic-btn" onclick="startSpeechRecognition()">
                    <span class="icon">🎤</span><span>SPEAK</span>
                </button>
                <button class="btn-main" style="background:#e0e7ff; color:var(--primary);" onclick="nextQuiz()">
                    <span class="icon">⏭️</span><span>NEXT</span>
                </button>
            </div>
            
            <div id="feedback" style="height: 35px; font-weight: 900; font-size: 1.4rem; margin-bottom: 10px; text-align: center;"></div>
            <div class="options-container" id="options-container"></div>

            <div style="display: flex; gap: 10px; justify-content: center; width: 100%; margin-top: 25px; margin-bottom: 20px;">
                <button class="back-link" style="margin-top: 0;" onclick="window.location.href='index.html';">🏠 HOME</button>
                <button class="back-link hint-btn" style="margin-top: 0;" onclick="showCorrectAnswer()">💡 Answer</button>
            </div>
        </div>

        <div class="control-panel">
            <div class="game-ad-bar" style="display: flex !important;">
                <div class="korea-badge">🇰🇷</div>
                <a href="https://breezesim.com/products/esim-south-korea?sca_ref=10996533.84IFCCRU2g" target="_blank" class="esim-btn-link">Get Korea eSIM</a>
                <div class="ad-moving-text" id="ad-content">No internet in Korea? You'll need data!</div>
                <div class="ad-fixed-small">+ Available in 200 countries</div>
            </div>
            <br>
            <div style="font-size: 0.9rem; font-weight: bold; color: #64748b;">1,000+ Essential Korean sentences / free</div>
            <a href="https://kstudy.netlify.app/" target="_blank" class="wide-slim-banner" style="display: block !important;"></a>
        </div>

    </div>
</div>

<div class="bottom-menu">
    <button onclick="shareApp()" class="menu-item"><span class="menu-emoji">📤</span><span class="menu-label">Share</span></button>
    <button onclick="visitFacebook()" class="menu-item"><span class="menu-emoji">📱</span><span class="menu-label">Facebook</span></button>
    <button onclick="addToHome()" class="menu-item"><span class="menu-emoji">🏠</span><span class="menu-label">Save App</span></button>
    <button onclick="sendEmail()" class="menu-item"><span class="menu-emoji">📧</span><span class="menu-label">E-mail</span></button>
</div>

<script src="date.js"></script>
<script src="script.js"></script>

<script>
    // 강제로 변수 세팅하고 뒤늦게 날뛰는 스크립트 실행 순서 통제
    CURRENT_CAT = 'cat_01';
    activeCatId = 'cat_01';

    // 1초 뒤에 확실하게 한 번 더 화면 요소를 체크해서 강제로 정렬 순서를 먹입니다.
    window.addEventListener('load', function() {
        if (typeof startQuiz === 'function') {
            startQuiz('cat_01', false);
        }
        
        // 주기적으로 돌면서 예문 박스가 생성되면 순서를 강제로 2번(광고 위)으로 지정하는 무적의 타이머
        setInterval(function() {
            let detail = document.getElementById('detail-area');
            if (detail) {
                detail.style.order = "2";
                detail.style.display = "block";
            }
            // 하단 카테고리 박스는 보이는 족족 강제 무력화
            let list = document.getElementById('category-list');
            if (list) list.style.display = 'none';
        }, 300);
    });
</script>
</body>
</html>
